name: Post Today to Instagram

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date tag (YYYYMMDD). Defaults to today JST."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve date
        id: date
        env:
          TZ: Asia/Tokyo
        run: |
          DATE="${{ inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date +%Y%m%d)
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Using date: $DATE"

      - name: Download video from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          DATE="${{ steps.date.outputs.date }}"
          gh release download "v${DATE}" -p "design-${DATE}.mp4" -D output/
          gh release download "v${DATE}" -p "design-${DATE}-cover.jpg" -D output/ || echo "No cover asset in release"

      - name: Prepare data + captions
        env:
          TZ: Asia/Tokyo
        run: |
          node scripts/generate-data.mjs
          node scripts/generate-caption.mjs

      - name: Upload to Instagram (resumable)
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          DATE="${{ steps.date.outputs.date }}"
          node scripts/upload-instagram.mjs --file="output/design-${DATE}.mp4"
